<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>256ai Swarm Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { color: #00d4ff; margin-bottom: 20px; }
        h2 { color: #888; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 0 auto; }

        .status-bar {
            background: #16213e;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-bar .status { font-size: 24px; font-weight: bold; }
        .status-bar .status.ok { color: #00ff88; }
        .status-bar .status.down { color: #ff4444; }
        .status-bar .meta { color: #888; font-size: 12px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
        }

        .workers-list { list-style: none; }
        .workers-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a4a;
        }
        .workers-list li:last-child { border-bottom: none; }
        .worker-name { font-weight: 500; }
        .worker-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .worker-status.online { background: #00ff8820; color: #00ff88; }
        .worker-status.offline { background: #ff444420; color: #ff4444; }

        .command-section { grid-column: 1 / -1; }
        .command-input {
            width: 100%;
            background: #0f0f23;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            padding: 15px;
            color: #eee;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .command-input:focus { outline: none; border-color: #00d4ff; }

        .target-select {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .target-select label {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #0f0f23;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .target-select label:hover { background: #2a2a4a; }
        .target-select input:checked + span { color: #00d4ff; }
        .target-select input { display: none; }

        .send-btn {
            background: #00d4ff;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .send-btn:hover { background: #00b8e6; transform: translateY(-1px); }
        .send-btn:disabled { background: #444; cursor: not-allowed; }

        .tasks-list { max-height: 300px; overflow-y: auto; }
        .task-item {
            padding: 12px;
            background: #0f0f23;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .task-item .objective { font-size: 14px; margin-bottom: 6px; }
        .task-item .meta { font-size: 11px; color: #888; display: flex; gap: 15px; }
        .task-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .task-status.PENDING { background: #ffaa0020; color: #ffaa00; }
        .task-status.IN_PROGRESS { background: #00d4ff20; color: #00d4ff; }
        .task-status.COMPLETED { background: #00ff8820; color: #00ff88; }
        .task-status.FAIL { background: #ff444420; color: #ff4444; }
        .task-status.CANCELLED { background: #88888820; color: #888888; }

        .cancel-btn {
            background: transparent;
            border: 1px solid #ff8800;
            color: #ff8800;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            margin-left: 8px;
        }
        .cancel-btn:hover { background: #ff880020; }

        .response-section { grid-column: 1 / -1; }
        .response-box {
            background: #0f0f23;
            border: 2px solid #2a2a4a;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .response-task-id {
            color: #00d4ff;
            font-size: 12px;
            font-family: monospace;
        }
        .response-empty {
            color: #666;
            font-style: italic;
        }
        .task-item.clickable {
            cursor: pointer;
            transition: background 0.2s;
        }
        .task-item.clickable:hover {
            background: #1a1a3a;
        }
        .task-item.selected {
            border: 1px solid #00d4ff;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #444;
            color: #888;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover { border-color: #00d4ff; color: #00d4ff; }

        .delete-btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            margin-left: 8px;
        }
        .delete-btn:hover { background: #ff444420; }

        .activity-log {
            max-height: 400px;
            overflow-y: auto;
        }
        .activity-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a4a;
            font-size: 13px;
        }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon { font-size: 14px; }
        .activity-time { color: #666; font-size: 11px; min-width: 70px; }
        .activity-message { flex: 1; }
        .activity-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }
        .activity-type.TASK_CREATED { background: #00d4ff20; color: #00d4ff; }
        .activity-type.TASK_CLAIMED { background: #ffaa0020; color: #ffaa00; }
        .activity-type.TASK_COMPLETED { background: #00ff8820; color: #00ff88; }
        .activity-type.TASK_FAILED { background: #ff444420; color: #ff4444; }
        .activity-type.WORKER_HEARTBEAT { background: #ff88ff20; color: #ff88ff; }
        .activity-type.ESCALATION { background: #ff444420; color: #ff4444; }

        .three-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 1200px) { .three-col-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .three-col-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>256ai Swarm Control</h1>

        <div class="status-bar">
            <div>
                <div class="status" id="overallStatus">--</div>
                <div class="meta">Control Plane: <span id="cpUrl">--</span></div>
            </div>
            <div class="meta" id="lastUpdate">Last update: --</div>
        </div>

        <div class="three-col-grid">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2>Workers</h2>
                    <button class="refresh-btn" onclick="refresh()">Refresh</button>
                </div>
                <ul class="workers-list" id="workersList">
                    <li><span class="worker-name">Loading...</span></li>
                </ul>
            </div>

            <div class="card">
                <h2>Recent Tasks</h2>
                <div class="tasks-list" id="tasksList">
                    <div class="task-item"><div class="objective">Loading...</div></div>
                </div>
            </div>

            <div class="card">
                <h2>Activity Log</h2>
                <div class="activity-log" id="activityLog">
                    <div class="activity-item"><span class="activity-message">Loading...</span></div>
                </div>
            </div>
        </div>

        <div class="grid">

            <div class="card response-section">
                <div class="response-header">
                    <h2>Response</h2>
                    <span class="response-task-id" id="responseTaskId"></span>
                </div>
                <div class="response-box" id="responseBox">
                    <span class="response-empty">Click a task to view its response, or send a command and wait for results...</span>
                </div>
            </div>

            <div class="card command-section">
                <h2>Send Command</h2>
                <input type="text" class="command-input" id="commandInput"
                       placeholder="Enter task objective... (e.g., 'Analyze the login flow')">

                <div class="target-select" id="targetSelect">
                    <label><input type="radio" name="target" value="general" checked><span>General (Any)</span></label>
                </div>

                <button class="send-btn" id="sendBtn" onclick="sendCommand()">Send Task</button>
                <span id="sendStatus" style="margin-left: 15px; color: #888;"></span>
            </div>
        </div>
    </div>

    <script>
        const CONTROL_PLANE = 'http://10.0.1.147:5100';

        async function fetchHealth() {
            try {
                const res = await fetch(`${CONTROL_PLANE}/health/summary`);
                const data = await res.json();

                const statusEl = document.getElementById('overallStatus');
                statusEl.textContent = data.overallStatus;
                statusEl.className = 'status ' + (data.overallStatus === 'OK' ? 'ok' : 'down');

                document.getElementById('cpUrl').textContent = CONTROL_PLANE;
                document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('overallStatus').textContent = 'UNREACHABLE';
                document.getElementById('overallStatus').className = 'status down';
            }
        }

        async function fetchWorkers() {
            try {
                const res = await fetch(`${CONTROL_PLANE}/health/workers`);
                const workers = await res.json();

                const list = document.getElementById('workersList');
                const targetSelect = document.getElementById('targetSelect');

                if (workers.length === 0) {
                    list.innerHTML = '<li><span class="worker-name">No workers registered</span></li>';
                    return;
                }

                // Update workers list with delete button for offline workers
                list.innerHTML = workers.map(w => `
                    <li>
                        <span class="worker-name">${w.workerId}</span>
                        <div>
                            <span class="worker-status ${w.isOnline ? 'online' : 'offline'}">
                                ${w.isOnline ? 'Online' : 'Offline'}
                            </span>
                            ${!w.isOnline ? `<button class="delete-btn" onclick="deleteWorker('${w.workerId}')">Remove</button>` : ''}
                        </div>
                    </li>
                `).join('');

                // Update target select with unique domains
                const domains = new Set(['general']);
                // Add common domains
                ['code', 'docs', 'ai-compute', 'data'].forEach(d => domains.add(d));

                targetSelect.innerHTML = Array.from(domains).map((d, i) => `
                    <label>
                        <input type="radio" name="target" value="${d}" ${i === 0 ? 'checked' : ''}>
                        <span>${d}</span>
                    </label>
                `).join('');
            } catch (e) {
                document.getElementById('workersList').innerHTML =
                    '<li><span class="worker-name">Error loading workers</span></li>';
            }
        }

        async function fetchTasks() {
            try {
                const res = await fetch(`${CONTROL_PLANE}/tasks?limit=10`);
                const tasks = await res.json();

                const list = document.getElementById('tasksList');

                if (tasks.length === 0) {
                    list.innerHTML = '<div class="task-item"><div class="objective">No tasks yet</div></div>';
                    return;
                }

                list.innerHTML = tasks.map(t => `
                    <div class="task-item clickable" onclick="viewTask('${t.taskId}')" data-task-id="${t.taskId}">
                        <div class="objective">
                            <span class="task-status ${t.status}">${t.status}</span>
                            ${t.objective.substring(0, 80)}${t.objective.length > 80 ? '...' : ''}
                            ${(t.status === 'PENDING' || t.status === 'IN_PROGRESS') ? `<button class="cancel-btn" onclick="event.stopPropagation(); cancelTask('${t.taskId}')">Cancel</button>` : ''}
                        </div>
                        <div class="meta">
                            <span>Domain: ${t.domain}</span>
                            <span>Worker: ${t.assignedWorkerId || 'Pending'}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('tasksList').innerHTML =
                    '<div class="task-item"><div class="objective">Error loading tasks</div></div>';
            }
        }

        async function sendCommand() {
            const input = document.getElementById('commandInput');
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('sendStatus');
            const domain = document.querySelector('input[name="target"]:checked').value;

            if (!input.value.trim()) {
                status.textContent = 'Enter a command first';
                status.style.color = '#ff4444';
                return;
            }

            btn.disabled = true;
            status.textContent = 'Sending...';
            status.style.color = '#00d4ff';

            try {
                const res = await fetch(`${CONTROL_PLANE}/tasks`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        objective: input.value,
                        domain: domain,
                        expectedOutputs: 'Task result'
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    status.textContent = `Task created: ${data.taskId.substring(0, 8)}...`;
                    status.style.color = '#00ff88';
                    input.value = '';
                    setTimeout(() => {
                        fetchTasks();
                        viewTask(data.taskId);
                    }, 500);
                } else {
                    status.textContent = 'Error: ' + (data.error || 'Failed');
                    status.style.color = '#ff4444';
                }
            } catch (e) {
                status.textContent = 'Error: Could not reach Control Plane';
                status.style.color = '#ff4444';
            }

            btn.disabled = false;
        }

        let selectedTaskId = null;
        let autoRefreshTask = null;

        async function viewTask(taskId) {
            selectedTaskId = taskId;

            // Highlight selected task
            document.querySelectorAll('.task-item').forEach(el => el.classList.remove('selected'));
            const taskEl = document.querySelector(`[data-task-id="${taskId}"]`);
            if (taskEl) taskEl.classList.add('selected');

            try {
                const res = await fetch(`${CONTROL_PLANE}/tasks/${taskId}`);
                const task = await res.json();

                const responseBox = document.getElementById('responseBox');
                const taskIdEl = document.getElementById('responseTaskId');

                taskIdEl.textContent = `Task: ${taskId.substring(0, 8)}... | Status: ${task.status}`;

                if (task.status === 'COMPLETED' && task.result) {
                    // Parse and display the result
                    let output = '';
                    if (typeof task.result === 'string') {
                        try {
                            const parsed = JSON.parse(task.result);
                            output = parsed.response || parsed.outputs?.response || JSON.stringify(parsed, null, 2);
                        } catch {
                            output = task.result;
                        }
                    } else if (task.result.response) {
                        output = task.result.response;
                    } else if (task.result.outputs?.response) {
                        output = task.result.outputs.response;
                    } else {
                        output = JSON.stringify(task.result, null, 2);
                    }
                    responseBox.innerHTML = `<span style="color: #00ff88;">✓ COMPLETED</span>\n\n${escapeHtml(output)}`;
                } else if (task.status === 'FAIL' && task.result) {
                    responseBox.innerHTML = `<span style="color: #ff4444;">✗ FAILED</span>\n\n${escapeHtml(task.result.error || JSON.stringify(task.result, null, 2))}`;
                } else if (task.status === 'IN_PROGRESS') {
                    responseBox.innerHTML = `<span style="color: #00d4ff;">⟳ IN PROGRESS</span>\n\nWorker: ${task.assignedWorkerId || 'Unknown'}\nWaiting for response...`;
                    // Auto-refresh this task
                    startAutoRefresh(taskId);
                } else if (task.status === 'CANCELLED') {
                    responseBox.innerHTML = `<span style="color: #888888;">⊘ CANCELLED</span>\n\nTask was cancelled.`;
                } else {
                    responseBox.innerHTML = `<span style="color: #ffaa00;">○ PENDING</span>\n\nWaiting for a worker to pick up this task...`;
                    startAutoRefresh(taskId);
                }
            } catch (e) {
                document.getElementById('responseBox').innerHTML = `<span style="color: #ff4444;">Error loading task details</span>`;
            }
        }

        function startAutoRefresh(taskId) {
            if (autoRefreshTask) clearInterval(autoRefreshTask);
            autoRefreshTask = setInterval(() => {
                if (selectedTaskId === taskId) {
                    viewTask(taskId);
                } else {
                    clearInterval(autoRefreshTask);
                }
            }, 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function cancelTask(taskId) {
            try {
                const res = await fetch(`${CONTROL_PLANE}/tasks/${taskId}/cancel`, { method: 'POST' });
                if (res.ok) {
                    fetchTasks();
                    fetchEvents();
                    if (selectedTaskId === taskId) viewTask(taskId);
                } else {
                    const data = await res.json();
                    alert('Cancel failed: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error: Could not reach Control Plane');
            }
        }

        async function deleteWorker(workerId) {
            if (!confirm(`Remove worker "${workerId}" from the list?`)) return;

            try {
                const res = await fetch(`${CONTROL_PLANE}/health/workers/${encodeURIComponent(workerId)}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    fetchWorkers();
                    fetchEvents();
                } else {
                    alert('Failed to remove worker');
                }
            } catch (e) {
                alert('Error: Could not reach Control Plane');
            }
        }

        async function fetchEvents() {
            try {
                const res = await fetch(`${CONTROL_PLANE}/events?limit=30`);
                const events = await res.json();

                const log = document.getElementById('activityLog');

                if (events.length === 0) {
                    log.innerHTML = '<div class="activity-item"><span class="activity-message">No activity yet</span></div>';
                    return;
                }

                log.innerHTML = events.map(e => `
                    <div class="activity-item">
                        <span class="activity-icon">${e.icon}</span>
                        <span class="activity-time">${formatTime(e.timestamp)}</span>
                        <span class="activity-type ${e.type}">${e.type.replace('_', ' ')}</span>
                        <span class="activity-message">${escapeHtml(e.message)}</span>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('activityLog').innerHTML =
                    '<div class="activity-item"><span class="activity-message">Error loading events</span></div>';
            }
        }

        function formatTime(timestamp) {
            const d = new Date(timestamp);
            return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function refresh() {
            fetchHealth();
            fetchWorkers();
            fetchTasks();
            fetchEvents();
        }

        // Initial load
        refresh();

        // Auto-refresh every 10 seconds
        setInterval(refresh, 10000);

        // Send on Enter
        document.getElementById('commandInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendCommand();
        });
    </script>
</body>
</html>
