version: "3.8"

services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: chorequest-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-choreflow}:${POSTGRES_PASSWORD:-choreflow}@postgres:5432/${POSTGRES_DB:-choreflow}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      REFRESH_TOKEN_EXPIRY: ${REFRESH_TOKEN_EXPIRY:-7d}
      PORT: "3000"
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chorequest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    container_name: chorequest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-choreflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-choreflow}
      POSTGRES_DB: ${POSTGRES_DB:-choreflow}
    # Port not exposed in production; use docker-compose.dev.yml for local access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    networks:
      - chorequest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-choreflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: chorequest-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      # - "${HTTPS_PORT:-443}:443"  # Uncomment when SSL is configured
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Uncomment when SSL certs are in place
    depends_on:
      api:
        condition: service_healthy
    networks:
      - chorequest
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    name: chorequest_postgres_data

networks:
  chorequest:
    name: chorequest
